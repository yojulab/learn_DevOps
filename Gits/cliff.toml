# git-cliff 설정 파일
# 상세 설정 가이드: https://git-cliff.org/docs/configuration

[changelog]
# 문서의 최상단에 들어갈 헤더 내용
header = """
# Development Documentation
이 문서는 Git 커밋 메시지를 바탕으로 자동 생성되었습니다.
"""
# 변경 로그의 본문 템플릿 (Tera 템플릿 엔진 사용)
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - **[{{ commit.author.timestamp | date(format="%Y-%m-%d") }}]** {{ commit.message | upper_first }} (by {{ commit.author.name }}, `{{ commit.id | truncate(length=7, end="") }}`)
    {% endfor %}
{% endfor %}\n
{% endif %}\
"""
# 문서의 최하단에 들어갈 푸터 내용
footer = """
<!-- generated by git-cliff -->
"""
# 템플릿의 앞뒤 공백을 제거할지 여부
trim = true

[git]
# Conventional Commits 규격(feat:, fix: 등)을 사용할지 여부
conventional_commits = true
# 규격을 따르지 않는 커밋을 제외할지 여부 (false면 모두 포함)
filter_unconventional = false
# 커밋 메시지의 각 줄을 별개의 커밋으로 처리할지 여부
split_commits = false
# 커밋 메시지 전처리 규칙 (정규표현식 사용 가능)
commit_preprocessors = [
  # 예: #123 형태의 이슈 번호를 GitHub 링크로 변환
  # { pattern = '\((\w+\s+)?#([0-9]+)\)', replace = "([#${2}](https://github.com/orhun/git-cliff/issues/${2}))"},
]
# 커밋 메시지를 파싱하여 그룹화하는 규칙
commit_parsers = [
  { message = ".*\\[skip ci\\].*", skip = true }, # [skip ci]가 포함된 커밋 제외 (자동화 봇 커밋 등)
  { message = "^docs: update DEVELOPMENT_DOC.md", skip = true }, # 특정 자동화 커밋 제외
  { message = "^feat", group = "Features" },         # 기능 추가
  { message = "^fix", group = "Fixes" },           # 버그 수정
  { message = "^update", group = "Updates" },       # 변경/유지보수
  { message = "^doc", group = "Documentation" },   # 문서 수정
  { message = "^perf", group = "Performance" },     # 성능 개선
  { message = "^refactor", group = "Refactor" },     # 리팩토링
  { message = "^style", group = "Styling" },       # 스타일 수정
  { message = "^test", group = "Testing" },         # 테스트 추가
  { message = "^chore\\(release\\): prepare for", skip = false }, # 릴리즈 커밋 제외
  { message = "^chore", group = "Miscellaneous Tasks" },         # 기타 작업
  { body = ".*security", group = "Security" },      # 본문에 security가 포함된 경우
]
# 이메일 주소 등 민감한 정보 보호 여부
protect_sensitive_references = true
# 태그 추출을 위한 패턴 (v로 시작하는 버전 태그)
tag_pattern = "v[0-9].*"
# 특정 태그 건너뛰기 설정
skip_tags = "v0.1.0-beta.1"
# 무시할 태그 설정
ignore_tags = ""
# 태그 정렬 방식 (위상 정렬 여부)
topo_order = true
# 섹션 내 커밋 정렬 방식 (oldest: 오래된 순, newest: 최신 순)
sort_commits = "oldest"
